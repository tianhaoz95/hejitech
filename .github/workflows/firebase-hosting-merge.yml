name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd home
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          
          # Run deployment and capture logs to safely handle the "version already active" edge case
          DEPLOY_STATUS=0
          npx firebase-tools deploy --only hosting > deploy.log 2>&1 || DEPLOY_STATUS=$?
          cat deploy.log
          
          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            if grep -q "is the current active version" deploy.log; then
              echo "Warning: Version is already active. Ignoring deployment error."
              exit 0
            else
              exit $DEPLOY_STATUS
            fi
          fi
          
          rm -f service-account.json
