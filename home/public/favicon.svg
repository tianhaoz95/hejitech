<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Glow filter for the central AI node -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded dark background matching our canvas -->
  <rect width="32" height="32" rx="8" fill="#09090b" stroke="#27272a" stroke-width="1"/>
  
  <!-- Outer segmented concentric ring representing network/inference -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#27272a" stroke-width="1.2" stroke-dasharray="4 2"/>
  
  <!-- Inner ring representing local on-device environment -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#3f3f46" stroke-width="1"/>
  
  <!-- Central glowing AI-native node matching our theme accent -->
  <circle cx="16" cy="16" r="2.5" fill="#14b8a6" filter="url(#glow)"/>
</svg>
